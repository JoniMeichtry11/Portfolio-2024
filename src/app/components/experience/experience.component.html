<section id="experience" class="mb-16 scroll-mt-16 lg:scroll-mt-24" aria-label="Work experience">
  <div class="sticky top-0 z-20 -mx-6 mb-4 w-screen bg-secondary/75 px-6 py-5 backdrop-blur md:-mx-12 md:px-12">
    <h2 class="text-sm lg:text-xl font-bold uppercase tracking-widest text-textPrimary">
      Experience
    </h2>
  </div>
  <div>
    <app-experience-timeline [experiences]="experiences"></app-experience-timeline>
    
    <div class="mt-12 ml-6">
      <a
        target="_blank"
        class="inline-flex items-center leading-tight font-semibold text-slate-200 group"
        aria-label="View Full CV"
        href="doc/Jonathan_Meichtry-Web-Developer.pdf"
      >
        <span>
          <span class="border-b border-transparent pb-px transition group-hover:border-red-300 motion-reduce:transition-none">
            View complete
          </span>
          <span class="whitespace-nowrap">
            <span class="border-b border-transparent pb-px transition group-hover:border-red-300 motion-reduce:transition-none">
              Resume
            </span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
              class="ml-1 inline-block h-4 w-4 shrink-0 -translate-y-px transition-transform group-hover:translate-x-2 group-focus-visible:translate-x-2 motion-reduce:transition-none"
              aria-hidden="true"
            >
              <path
                fill-rule="evenodd"
                d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z"
                clip-rule="evenodd"
              ></path>
            </svg>
          </span>
        </span>
      </a>
    </div>
  </div>
</section>
